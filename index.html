<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f1411" />
    <!-- Montserrat is used ONLY by the visualizer canvas (which already has font fallbacks). Loading it
         as a normal <link> in <head> is render-blocking — it stalled the FIRST PAINT on a font the launch
         screen never uses (and froze launch entirely with no/slow network). Load it asynchronously so it
         never blocks the app appearing; it swaps in by the time the visualizer needs it. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" /></noscript>
    <title>Wove</title>
    <!-- Instant boot splash: pure inline HTML+CSS+SVG, ZERO JavaScript. The WebView paints this the moment
         it has the document — so the OS launcher-icon splash hands off to the SAME "W", animated the SAME
         way as the Android launch splash (avd_icon_default): the outline traces on, then the fill flows in.
         No green-bars interstitial — one continuous W from cold-start to app. React replaces #root's
         contents on its first commit, which removes the splash automatically. -->
    <style>
      html, body { margin: 0; height: 100%; background: #0f1411; }
      #boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0f1411; z-index: 2147483647;
      }
      #boot svg { width: 116px; height: 116px; transform-origin: center; animation: bootPulse 1.7s ease-in-out .62s infinite; }
      /* trace the outline on (like the native trimPath), then flow the fill in — matches Android. */
      #boot .w-stroke {
        fill: none; stroke: #C9637A; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 1; stroke-dashoffset: 1; animation: wTrace .42s ease forwards;
      }
      #boot .w-fill { fill: url(#bootW); fill-opacity: 0; animation: wFill .26s ease .3s forwards; }
      @keyframes wTrace { to { stroke-dashoffset: 0; } }
      @keyframes wFill { to { fill-opacity: 1; } }
      @keyframes bootPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: .85; } }
      @media (prefers-reduced-motion: reduce) {
        #boot svg { animation: none; }
        #boot .w-stroke { animation: none; opacity: 0; }
        #boot .w-fill { animation: none; fill-opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <svg viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg" aria-label="Wove">
          <defs>
            <linearGradient id="bootW" x1="26" y1="30" x2="82" y2="80" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#B14E63" />
              <stop offset="1" stop-color="#6F2C3C" />
            </linearGradient>
          </defs>
          <!-- same path as the launcher icon + native splash; stroke layer traces, fill layer flows in -->
          <path class="w-fill"   d="M26,34 L36,34 L48,76 L40,76 Z M42,76 L50,76 L58,50 L50,50 Z M50,50 L58,50 L70,76 L62,76 Z M64,76 L72,76 L82,34 L72,34 Z" />
          <path class="w-stroke" pathLength="1" d="M26,34 L36,34 L48,76 L40,76 Z M42,76 L50,76 L58,50 L50,50 Z M50,50 L58,50 L70,76 L62,76 Z M64,76 L72,76 L82,34 L72,34 Z" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
