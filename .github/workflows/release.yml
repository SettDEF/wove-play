name: Release

# Builds installers for every pushed tag (e.g. `v0.2.0`) and attaches them to a draft GitHub Release.
# Windows → NSIS `.exe` + `.msi` · Linux → deb / rpm / AppImage. macOS can be added the same way.
# Trigger manually from the Actions tab (workflow_dispatch) or by pushing a version tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest   # → Wove_x.y.z_x64-setup.exe (NSIS) + .msi
          - os: ubuntu-22.04     # → .deb / .rpm / .AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libasound2-dev build-essential file

      - name: Install JS deps
        run: npm ci

      - name: Build app + bundle installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Linux AppImage: skip strip (old linuxdeploy strip can't parse new ELF .relr.dyn) + extract-run
          NO_STRIP: "true"
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Wove ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
